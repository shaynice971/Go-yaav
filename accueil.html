<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A1628" />
  <title>Go'Yaav — Où allez-vous ?</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --night: #0A1628; --ocean: #0D2444; --mango: #FF6B2B;
      --mango-light: #FF8C5A; --lime: #C8F135; --white: #F7F4EE; --grey: #8A9BB0;
    }
    html, body { height: 100%; background: var(--night); color: var(--white); font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { position: fixed; inset: 0; z-index: 0; }
    .leaflet-tile-pane { filter: hue-rotate(200deg) saturate(0.6) brightness(0.5); }
    .overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, rgba(10,22,40,0.85) 0%, rgba(10,22,40,0.05) 40%, rgba(10,22,40,0.05) 55%, rgba(10,22,40,0.97) 100%); }
    .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 52px 20px 16px; display: flex; align-items: center; justify-content: space-between; max-width: 430px; margin: 0 auto; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--white); }
    .logo-text span { color: var(--mango); }
    .profile-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); text-decoration: none; }
    .bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; max-width: 430px; margin: 0 auto; }
    .panel-card { background: rgba(13,36,68,0.97); backdrop-filter: blur(20px); border-radius: 24px 24px 0 0; border-top: 1px solid rgba(255,255,255,0.08); padding: 16px 20px 0; }
    .panel-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 16px; }
    .panel-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 14px; }
    .route-inputs { display: flex; gap: 12px; margin-bottom: 14px; }
    .route-dots { display: flex; flex-direction: column; align-items: center; padding-top: 16px; }
    .dot-origin { width: 10px; height: 10px; border-radius: 50%; background: var(--lime); flex-shrink: 0; }
    .route-line { width: 2px; flex: 1; min-height: 20px; background: linear-gradient(to bottom, var(--lime), var(--mango)); opacity: 0.4; margin: 4px 0; }
    .dot-dest { width: 10px; height: 10px; border-radius: 50%; background: var(--mango); flex-shrink: 0; }
    .route-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .route-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.2s ease; }
    .route-input:hover { border-color: var(--mango); background: rgba(255,107,43,0.06); }
    .route-input-text { flex: 1; font-size: 14px; color: var(--grey); }
    .route-input-text.filled { color: var(--white); font-weight: 500; }
    .locate-btn { background: rgba(200,241,53,0.15); border: none; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 600; color: var(--lime); cursor: pointer; white-space: nowrap; }
    .modes { display: flex; gap: 8px; margin-bottom: 14px; }
    .mode-btn { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s ease; }
    .mode-btn.selected { background: rgba(255,107,43,0.12); border-color: var(--mango); }
    .mode-icon { font-size: 20px; margin-bottom: 3px; }
    .mode-name { font-size: 11px; font-weight: 600; color: var(--grey); }
    .mode-btn.selected .mode-name { color: var(--mango-light); }
    .mode-price { font-size: 13px; font-weight: 700; color: var(--white); margin-top: 2px; }
    .btn-commander { width: 100%; padding: 17px; border-radius: 16px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; border: none; cursor: pointer; background: var(--mango); color: white; box-shadow: 0 8px 32px rgba(255,107,43,0.4); margin-bottom: 14px; transition: transform 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-commander:active { transform: scale(0.97); }
    .btn-commander:disabled { opacity: 0.4; cursor: not-allowed; }
    .payment-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 24px; border-top: 1px solid rgba(255,255,255,0.06); }
    .payment-current { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .promo-btn { font-size: 13px; color: var(--mango-light); cursor: pointer; text-decoration: underline; }
    .search-overlay { position: fixed; inset: 0; z-index: 20; background: var(--night); padding: 52px 20px 20px; display: none; flex-direction: column; max-width: 430px; margin: 0 auto; left: 0; right: 0; }
    .search-overlay.visible { display: flex; }
    .search-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .back-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }
    .search-input-field { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--mango); border-radius: 12px; padding: 13px 14px; font-family: 'Inter', sans-serif; font-size: 15px; color: var(--white); outline: none; }
    .search-input-field::placeholder { color: var(--grey); }
    .search-suggestions { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .suggestion-item { display: flex; align-items: center; gap: 14px; padding: 14px 12px; border-radius: 12px; cursor: pointer; transition: background 0.15s ease; }
    .suggestion-item:hover { background: rgba(255,255,255,0.05); }
    .suggestion-icon-wrap { width: 36px; height: 36px; background: rgba(255,255,255,0.07); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .suggestion-name { font-size: 14px; font-weight: 500; color: var(--white); }
    .suggestion-area { font-size: 12px; color: var(--grey); margin-top: 2px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="overlay"></div>

  <div class="top-bar">
    <div class="logo-text">Go<span>'</span>Yaav</div>
    <a href="profil.html" class="profile-btn">👤</a>
  </div>

  <div class="bottom-panel">
    <div class="panel-card">
      <div class="panel-handle"></div>
      <div class="panel-title">Où allez-vous ?</div>
      <div class="route-inputs">
        <div class="route-dots">
          <div class="dot-origin"></div>
          <div class="route-line"></div>
          <div class="dot-dest"></div>
        </div>
        <div class="route-fields">
          <div class="route-input" onclick="openSearch('depart')">
            <span class="route-input-text" id="textDepart">Ma position actuelle</span>
            <button class="locate-btn" onclick="event.stopPropagation(); locateMe()">📍 Me localiser</button>
          </div>
          <div class="route-input" onclick="openSearch('arrivee')">
            <span class="route-input-text" id="textArrivee">Choisir une destination</span>
          </div>
        </div>
      </div>
      <div class="modes">
        <div class="mode-btn selected" id="mode-standard" onclick="selectMode('standard')">
          <div class="mode-icon">🚗</div>
          <div class="mode-name">Standard</div>
          <div class="mode-price" id="price-standard">—</div>
        </div>
        <div class="mode-btn" id="mode-she" onclick="selectMode('she')">
          <div class="mode-icon">👩</div>
          <div class="mode-name">She Rides</div>
          <div class="mode-price" id="price-she">—</div>
        </div>
        <div class="mode-btn" id="mode-xl" onclick="selectMode('xl')">
          <div class="mode-icon">🚐</div>
          <div class="mode-name">XL</div>
          <div class="mode-price" id="price-xl">—</div>
        </div>
      </div>
      <button class="btn-commander" id="btnCommander" onclick="commander()" disabled>
        <span>Commander</span><span id="btnPrice"></span>
      </button>
      <div class="payment-row">
        <div class="payment-current">
          <span>💳</span><span>Carte bancaire</span>
          <span style="color:var(--grey);font-size:12px;">›</span>
        </div>
        <div class="promo-btn">Code promo</div>
      </div>
    </div>
  </div>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-header">
      <div class="back-btn" onclick="closeSearch()">←</div>
      <input type="text" class="search-input-field" id="searchField"
        placeholder="Rechercher un lieu en Guadeloupe..."
        oninput="filterSuggestions(this.value)" />
    </div>
    <div class="search-suggestions" id="searchSuggestions"></div>
  </div>

  <script>
    const map = L.map('map', { center: [16.265, -61.551], zoom: 11, zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

    let markerDepart = null, markerArrivee = null, routeLine = null;

    const iconDepart = L.divIcon({ html: '<div style="width:14px;height:14px;background:#C8F135;border-radius:50%;border:2px solid white;box-shadow:0 0 8px rgba(200,241,53,0.6)"></div>', iconSize: [14,14], iconAnchor: [7,7], className: '' });
    const iconArrivee = L.divIcon({ html: '<div style="width:14px;height:14px;background:#FF6B2B;border-radius:50%;border:2px solid white;box-shadow:0 0 8px rgba(255,107,43,0.6)"></div>', iconSize: [14,14], iconAnchor: [7,7], className: '' });

    const lieux = [
      { name: "Aéroport Pôle Caraïbes", area: "Les Abymes", lat: 16.2653, lng: -61.5272, icon: "✈️" },
      { name: "Pointe-à-Pitre", area: "Centre-ville", lat: 16.2412, lng: -61.5331, icon: "🏙️" },
      { name: "Saint-François", area: "Grande-Terre", lat: 16.2522, lng: -61.2617, icon: "🏖️" },
      { name: "Le Moule", area: "Grande-Terre", lat: 16.3308, lng: -61.3511, icon: "🌊" },
      { name: "Sainte-Anne", area: "Grande-Terre", lat: 16.2258, lng: -61.3828, icon: "🏝️" },
      { name: "Gosier", area: "Grande-Terre", lat: 16.2050, lng: -61.4990, icon: "🌴" },
      { name: "Basse-Terre", area: "Basse-Terre", lat: 15.9961, lng: -61.7254, icon: "🏔️" },
      { name: "Capesterre-Belle-Eau", area: "Basse-Terre", lat: 16.0436, lng: -61.5617, icon: "🌿" },
      { name: "Trois-Rivières", area: "Basse-Terre", lat: 15.9686, lng: -61.6550, icon: "🏞️" },
      { name: "Deshaies", area: "Basse-Terre", lat: 16.3078, lng: -61.7969, icon: "🤿" },
      { name: "Grand-Bourg", area: "Marie-Galante", lat: 15.8838, lng: -61.2647, icon: "🍬" },
      { name: "CHU de Pointe-à-Pitre", area: "Les Abymes", lat: 16.2622, lng: -61.5511, icon: "🏥" },
      { name: "Gare routière de Bergevin", area: "Pointe-à-Pitre", lat: 16.2390, lng: -61.5400, icon: "🚌" },
      { name: "Centre commercial Destreland", area: "Baie-Mahault", lat: 16.2700, lng: -61.5750, icon: "🛍️" },
      { name: "Plage de la Caravelle", area: "Sainte-Anne", lat: 16.2180, lng: -61.3900, icon: "🏄" },
      { name: "Jardin Botanique de Deshaies", area: "Basse-Terre", lat: 16.3120, lng: -61.7990, icon: "🌺" },
      { name: "Chutes du Carbet", area: "Capesterre", lat: 16.0300, lng: -61.6200, icon: "💧" },
      { name: "Mémorial ACTe", area: "Pointe-à-Pitre", lat: 16.2350, lng: -61.5280, icon: "🏛️" },
    ];

    let searchType = 'depart';
    let departData = null, arriveeData = null;

    function openSearch(type) {
      searchType = type;
      document.getElementById('searchOverlay').classList.add('visible');
      document.getElementById('searchField').value = '';
      document.getElementById('searchField').focus();
      renderSuggestions(lieux);
    }

    function closeSearch() {
      document.getElementById('searchOverlay').classList.remove('visible');
    }

    function renderSuggestions(items) {
      document.getElementById('searchSuggestions').innerHTML = items.map(l => `
        <div class="suggestion-item" onclick='selectLieu(${JSON.stringify(l)})'>
          <div class="suggestion-icon-wrap">${l.icon}</div>
          <div>
            <div class="suggestion-name">${l.name}</div>
            <div class="suggestion-area">${l.area}, Guadeloupe</div>
          </div>
        </div>`).join('');
    }

    function filterSuggestions(q) {
      const r = q ? lieux.filter(l => l.name.toLowerCase().includes(q.toLowerCase()) || l.area.toLowerCase().includes(q.toLowerCase())) : lieux;
      renderSuggestions(r.length ? r : lieux);
    }

    function selectLieu(lieu) {
      if (searchType === 'depart') {
        departData = lieu;
        const el = document.getElementById('textDepart');
        el.textContent = lieu.name; el.classList.add('filled');
        if (markerDepart) map.removeLayer(markerDepart);
        markerDepart = L.marker([lieu.lat, lieu.lng], { icon: iconDepart }).addTo(map);
      } else {
        arriveeData = lieu;
        const el = document.getElementById('textArrivee');
        el.textContent = lieu.name; el.classList.add('filled');
        if (markerArrivee) map.removeLayer(markerArrivee);
        markerArrivee = L.marker([lieu.lat, lieu.lng], { icon: iconArrivee }).addTo(map);
      }
      closeSearch();
      updateRoute();
    }

    function locateMe() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        departData = { name: 'Ma position', area: '', lat: pos.coords.latitude, lng: pos.coords.longitude };
        const el = document.getElementById('textDepart');
        el.textContent = 'Ma position actuelle'; el.classList.add('filled');
        if (markerDepart) map.removeLayer(markerDepart);
        markerDepart = L.marker([pos.coords.latitude, pos.coords.longitude], { icon: iconDepart }).addTo(map);
        map.setView([pos.coords.latitude, pos.coords.longitude], 13);
        updateRoute();
      });
    }

    function updateRoute() {
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
      if (departData && arriveeData) {
        routeLine = L.polyline([[departData.lat, departData.lng], [arriveeData.lat, arriveeData.lng]], { color: '#FF6B2B', weight: 3, opacity: 0.8, dashArray: '6,8' }).addTo(map);
        map.fitBounds(routeLine.getBounds(), { padding: [80, 80] });
        const dist = map.distance([departData.lat, departData.lng], [arriveeData.lat, arriveeData.lng]) / 1000;
        const prix = Math.max(5, Math.round(2.5 + dist * 0.9));
        document.getElementById('price-standard').textContent = prix + '€';
        document.getElementById('price-she').textContent = (prix + 1) + '€';
        document.getElementById('price-xl').textContent = (prix + 3) + '€';
        document.getElementById('btnPrice').textContent = '· ' + prix + '€';
        document.getElementById('btnCommander').disabled = false;
      }
    }

    let selectedMode = 'standard';

    function selectMode(mode) {
      selectedMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('mode-' + mode).classList.add('selected');
      const p = document.getElementById('price-' + mode).textContent;
      if (p !== '—') document.getElementById('btnPrice').textContent = '· ' + p;
    }

    function commander() {
      if (!departData || !arriveeData) return;
      const params = new URLSearchParams({ depart: departData.name, arrivee: arriveeData.name, mode: selectedMode, prix: document.getElementById('price-' + selectedMode).textContent });
      window.location.href = 'recherche.html?' + params.toString();
    }
  </script>
</body>
</html>
